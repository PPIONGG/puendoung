version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: puendoung-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - puendoung-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: puendoung-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: 3001
      API_HOST: 0.0.0.0
      WEB_ORIGIN: ${WEB_ORIGIN}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MOCK_PAYMENT_DELAY_MS: ${MOCK_PAYMENT_DELAY_MS:-0}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - puendoung-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: puendoung-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - puendoung-network

  backup:
    image: postgres:16-alpine
    container_name: puendoung-backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    command: >
      sh -c '
        echo "0 2 * * * pg_dump -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -F c -f /backups/backup_$$(date +\%Y\%m\%d_\%H\%M\%S).dump" | crontab - && crond -f
      '
    depends_on:
      - postgres
    networks:
      - puendoung-network

volumes:
  postgres_data:

networks:
  puendoung-network:
    driver: bridge
