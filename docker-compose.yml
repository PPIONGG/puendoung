version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: puendoung-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: puendoung
      POSTGRES_PASSWORD: puendoung
      POSTGRES_DB: puendoung
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
